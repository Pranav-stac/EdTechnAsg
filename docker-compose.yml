services:
  postgres:
    image: postgres:16-alpine
    container_name: manzilchaser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: manzil
      POSTGRES_PASSWORD: manzil123
      POSTGRES_DB: manzilchaser
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
