version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - npm run build -w @manzilchaser/shared
            - export API_URL=https://api.manzil.praanav.in
            - export NEXT_PUBLIC_API_URL=https://api.manzil.praanav.in
        build:
          commands:
            - export API_URL=https://api.manzil.praanav.in
            - export NEXT_PUBLIC_API_URL=https://api.manzil.praanav.in
            - npm run build -w @manzilchaser/web
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - apps/web/node_modules/**/*
          - packages/shared/node_modules/**/*
