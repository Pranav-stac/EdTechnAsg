version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - npm run build -w @manzilchaser/shared
        build:
          commands:
            - npm run build -w @manzilchaser/web
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - apps/web/node_modules/**/*
          - packages/shared/node_modules/**/*
